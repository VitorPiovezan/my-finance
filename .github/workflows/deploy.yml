name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          # Sub-path do Pages: https://<user>.github.io/my-finance/
          VITE_BASE_PATH: /my-finance/
          # Único secret que ainda entra no bundle: o PIN do gate (texto puro).
          # Ele é visível no JS público; é um obstáculo leve, não segurança forte.
          # As demais credenciais (chave do Gemini, OAuth Client ID, Drive folder)
          # são configuradas pelo próprio usuário dentro do app e ficam no SQLite
          # local — nunca entram no bundle público.
          VITE_APP_ACCESS_PIN: ${{ secrets.VITE_APP_ACCESS_PIN }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
