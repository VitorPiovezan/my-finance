name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          # Sub-path do Pages: https://<user>.github.io/my-finance/
          VITE_BASE_PATH: /my-finance/
          # Secrets do repo (Settings → Secrets and variables → Actions).
          # Todos são opcionais exceto VITE_APP_ACCESS_PIN_SHA256 se você quer o gate.
          VITE_APP_ACCESS_PIN_SHA256: ${{ secrets.VITE_APP_ACCESS_PIN_SHA256 }}
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}
          VITE_DRIVE_FINANCE_ROOT_FOLDER_ID: ${{ secrets.VITE_DRIVE_FINANCE_ROOT_FOLDER_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_GEMINI_MODEL: ${{ secrets.VITE_GEMINI_MODEL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
