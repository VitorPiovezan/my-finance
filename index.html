<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!--
      Expo WebView: após o Google/Firebase, o Custom Tab precisa reabrir o app
      (scheme myfinance://). Só com ?x_rn=1 (só o app nativo + WebView) + parâmetros
      típicos de retorno; usuários no browser comum não recebem x_rn=1.
    -->
    <script>
      (function () {
        if (location.protocol === 'file:') return
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return
        if (location.hostname !== 'vitorpiovezan.com.br') return
        var q
        try {
          q = new URLSearchParams(location.search)
        } catch (e) {
          return
        }
        if (q.get('x_rn') !== '1') return
        if (!/apiKey=|mode=|oobCode=|state=|code=/.test(location.search)) return
        var payload = (location.search || '') + (location.hash || '')
        if (payload.length < 2) return
        location.replace('myfinance://oauth?p=' + encodeURIComponent(payload))
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Finance</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
